name: Package Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build ("main" = build only)'
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  extension:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kde
            script: ./scripts/build_kde_embed.sh
            artifact: waywallen-kde
            pattern: build/waywallen-kde-*.zip
            packages: >-
              cmake ninja-build g++ pkg-config
              qt6-base-dev qt6-declarative-dev
              libegl-dev libgles-dev libvulkan-dev
          - name: gnome
            script: ./scripts/build_gnome_zip.sh
            artifact: waywallen-gnome
            pattern: build/waywallen-gnome-*.zip
            packages: >-
              cmake ninja-build g++ pkg-config
              libgtk-4-dev libglib2.0-dev
              gobject-introspection libgirepository1.0-dev
              gir1.2-gtk-4.0
              libvulkan-dev libegl-dev libgles-dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.packages }}

      - name: Build ${{ matrix.name }} extension
        run: ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.pattern }}
          if-no-files-found: error

  release:
    needs: extension
    runs-on: ubuntu-24.04
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v'))
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Determine release
        id: rel
        run: |
          echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.rel.outputs.tag }}
          artifacts: dist/*.zip
          immutableCreate: true
          skipIfReleaseExists: true
