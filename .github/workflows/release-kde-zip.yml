name: Release KDE wallpaper zip

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kde-zip:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            qt6-base-dev qt6-declarative-dev \
            libegl-dev libgles-dev libvulkan-dev

      - name: Build KDE wallpaper zip (embedded module)
        run: ./scripts/build_kde_embed.sh

      - name: Locate zip
        id: zip
        run: |
          path=$(ls build/waywallen-kde-*.zip | head -n1)
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$path")" >> "$GITHUB_OUTPUT"

      # archive: false (v7+) skips the wrapper-zip that upload-artifact
      # otherwise puts around uploaded files, so the kpackage zip is
      # served as-is. The artifact name is taken from the file name.
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.zip.outputs.path }}
          archive: false

      - name: Attach zip to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
